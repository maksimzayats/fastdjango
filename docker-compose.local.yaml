services:
  api:
    volumes:
      - ./src:/app/src:ro
    command:
      - uvicorn
      - fastdjango.core.shared.delivery.fastapi.app:app
      - --reload
      - --host
      - 0.0.0.0
      - --port
      - "8000"

  celery-worker:
    volumes:
      - ./src:/app/src:ro
    command:
      - watchmedo
      - auto-restart
      - --directory=/app/src
      - --pattern=*.py
      - --recursive
      - --
      - celery
      - --app=fastdjango.core.shared.delivery.celery.app
      - worker
      - --loglevel=${LOGGING_LEVEL:-INFO}
      - --concurrency=2

  celery-beat:
    volumes:
      - ./src:/app/src:ro
    command:
      - watchmedo
      - auto-restart
      - --directory=/app/src
      - --pattern=*.py
      - --recursive
      - --
      - celery
      - --app=fastdjango.core.shared.delivery.celery.app
      - beat
      - --loglevel=${LOGGING_LEVEL:-INFO}

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  minio:
    ports:
      - "9000:9000"
      - "9001:9001"
