[flake8]
format = wemake
show-source = true
statistics = false
doctests = true

max-complexity = 6
max-line-length = 100
max-imports = 17
max-arguments = 6
allowed-domain-names = data

select = WPS,E999

extend-exclude =
  .venv
  htmlcov
  site

per-file-ignores =
  # The dependency updater is an operational script that parses multiple external
  # metadata formats; keep WPS active, but avoid splitting it into fake modules.
  management/dependency_updater.py:
    WPS110,
    WPS201,
    WPS202,
    WPS204,
    WPS210,
    WPS221,
    WPS226,
    WPS231,
    WPS237,
    WPS301,
    WPS335,
    WPS336,
    WPS363,
    WPS407,
    WPS430,
    WPS504
  # Exception contracts are intentionally uppercase class attributes.
  src/fastapi_template/core/**/repositories/*.py:
    WPS115
  src/fastapi_template/core/**/services/*.py:
    WPS115
  src/fastapi_template/core/**/use_cases/*.py:
    WPS115
  src/fastapi_template/core/shared/delivery/fastapi/request.py:
    WPS115
  src/fastapi_template/core/health/use_cases/system_health.py:
    WPS111,
    WPS115
  # Revoke maps the complete refresh-token exception contract at the route edge.
  src/fastapi_template/core/authentication/delivery/fastapi/controllers/revoke_token.py:
    WPS238
  # Websocket health checks intentionally perform a compact readiness loop.
  src/fastapi_template/core/health/delivery/fastapi/controllers/health_check_websocket.py:
    WPS217
  # The FastAPI composition root imports all endpoint-scoped controllers.
  src/fastapi_template/entrypoints/fastapi/factory.py:
    WPS201
  # Dataclass lifecycle hooks are intentionally paired with callable factories.
  src/fastapi_template/infrastructure/throttled/async_throttler_factory.py:
    WPS338
  src/fastapi_template/infrastructure/throttled/throttler_factory.py:
    WPS338
