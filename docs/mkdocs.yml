site_name: Modern Python Template
site_url: https://template.zayats.dev
site_description: Modern Python service template with FastAPI, SQLAlchemy, Alembic, dependency injection, and strict quality checks
repo_url: https://github.com/maksimzayats/modern-python-template
repo_name: maksimzayats/modern-python-template

docs_dir: en
site_dir: ../site

theme:
  name: material
  features:
    - navigation.indexes
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
    - getting-started/index.md
    - Quick Start: getting-started/quick-start.md
    - Project Structure: getting-started/project-structure.md
  - Concepts:
    - concepts/index.md
    - Architecture: concepts/architecture.md
    - Dependency Injection: concepts/ioc-container.md
    - Settings: concepts/settings.md
  - How-To Guides:
    - how-to/index.md
    - Add an HTTP Endpoint: how-to/add-http-endpoint.md
    - Run Migrations: how-to/run-migrations.md
    - Override IoC in Tests: how-to/override-ioc-in-tests.md
  - Reference:
    - reference/index.md
    - Environment Variables: reference/environment-variables.md
    - Makefile Commands: reference/makefile.md
    - Docker Services: reference/docker-services.md
